<!DOCTYPE html>
<html  lang="en-US">
<head>
<meta charset="UTF-8">
<title>Clock - Tjalla</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet"
	href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
<link href="https://fonts.googleapis.com/css2?family=Heebo&display=swap"
	rel="stylesheet">
<script
	src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

<script
	src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js">
	</script>
<style>
#clock {
	background-image: url("img/tjalla-wall-clock.png");
	background-repeat: no-repeat;
}

body {
 background-color: rgba(30, 30, 30, 255)
}
</style>
</head>
<body>
	<div id="clock">
		<canvas id="clock-canvas" width="900" height="900"></canvas>
	</div>
	<script>
var canvas = document.getElementById("clock-canvas");
var ctx = canvas.getContext("2d");
var radius = canvas.height / 2;
ctx.translate(radius, radius);
radius = radius * 0.90
drawClock();
setInterval(drawClock, 1000);

function drawClock() {
	ctx.clearRect(-canvas.width, -canvas.height, canvas.width*2, canvas.height*2);
	drawTime(ctx, radius);
}

function drawTime(ctx, radius){
	  var now = new Date();
	  var hour = now.getHours();
	  var minute = now.getMinutes();
	  var second = now.getSeconds();
	  ctx.strokeStyle = "#2D2D2F";
	  //hour
	  hour = hour%12;
	  hour = (hour*Math.PI/6)+(minute*Math.PI/(6*60))+(second*Math.PI/(360*60));
	  drawHand(ctx, hour, radius*0.55, radius*0.045);
	  //minute
	  minute = (minute*Math.PI/30)+(second*Math.PI/(30*60));
	  drawHand(ctx, minute, radius*0.8, radius*0.045);
	  // draw hub
	  ctx.fillStyle = '#2D2D2F';
	  ctx.beginPath();
	  ctx.arc(0, 0, radius*0.035, 0, 2 * Math.PI, false);
      ctx.fill();
	  // second
	  ctx.strokeStyle = "#FE3432";
	  second = (second*Math.PI/30);
	  drawHand(ctx, second, radius*0.85, radius*0.01);
	  // draw hub
	  ctx.fillStyle = '#FE3432';
	  ctx.beginPath();
	  ctx.arc(0, 0, radius*0.025, 0, 2 * Math.PI, false);
      ctx.fill();
	}

	function drawHand(ctx, pos, length, width) {
	  ctx.beginPath();
	  ctx.lineWidth = width;
	  //ctx.lineCap = "round";
	  ctx.rotate(pos);
	  ctx.moveTo(0,radius*0.15);
	  ctx.lineTo(0, -length);
	  ctx.stroke();
	  ctx.rotate(-pos);
	}
</script>
</body>
</html>
